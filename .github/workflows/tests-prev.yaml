on:
  push:
    branches: [main]

jobs:
  run-prev-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: echo "$ENV_PREVIEW" > .env.preview
        env:
          ENV_PREVIEW: ${{ secrets.ENV_PREVIEW }}
      - run: bun run test:prev
